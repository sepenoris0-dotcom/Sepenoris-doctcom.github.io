<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepe Noris - Influenceur</title>
    <meta name="description" content="Page officielle de Sepe Noris, Influenceur. Rejoins-moi sur Facebook, WhatsApp et TikTok.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            text-align: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            padding: 40px 30px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #FFD700;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h1 { 
            font-size: 2.8em; 
            margin-bottom: 8px;
            font-weight: 700;
        }
        .role {
            font-size: 1.3em;
            margin-bottom: 25px;
            color: #FFD700;
            font-weight: 600;
        }
        p { 
            font-size: 1.1em; 
            margin-bottom: 35px;
            line-height: 1.6;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 16px 30px;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-3px);
        }
        .btn-facebook {
            background: #1877f2;
            box-shadow: 0 4px 15px rgba(24, 119, 242, 0.4);
        }
        .btn-facebook:hover {
            background: #0d5cbd;
        }
        .btn-whatsapp {
            background: #25D366;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }
        .btn-whatsapp:hover {
            background: #1da851;
        }
        .btn-tiktok {
            background: #000000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .btn-tiktok:hover {
            background: #222222;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Ta photo : mets photo.jpg dans le même dossier -->
        <img src="photo.jpg" alt="Sepe Noris" class="profile-pic">
        
        <h1>Sepe Noris</h1>
        <div class="role">Influenceur</div>
        <p>Bienvenue sur ma page officielle !<br>
        Retrouve tout mon contenu et contacte-moi ici 👇</p>
        
        <div class="buttons">
            <a href="https://www.facebook.com/share/18RoLthPD2/?mibextid=wwXIfr" 
               class="btn btn-facebook" 
               target="_blank">
                🔵 Facebook
            </a>
            
            <!-- REMPLACE PAR TON NUMÉRO : Ex: 243970000000 -->
            <a href="https://wa.me/243XXXXXXXXX" 
               class="btn btn-whatsapp" 
               target="_blank">
                💬 WhatsApp
            </a>
            
            <!-- REMPLACE PAR TON LIEN TIKTOK -->
            <a href="https://tiktok.com/@tonpseudo" 
               class="btn btn-tiktok" 
               target="_blank">
                🎵 TikTok
            </a>
        </div>
        
        <div class="footer">
            © 2026 Sepe Noris | Lubumbashi, CD
        </div>
    </div>
</body>
</html>
